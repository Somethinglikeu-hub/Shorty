name: Generate Short

on:
  workflow_dispatch:
    inputs:
      seed_topic:
        description: Optional topic hint
        required: false
        type: string
      privacy:
        description: Upload privacy
        required: true
        default: private
        type: choice
        options:
          - private
          - unlisted

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      PORT: 3000
      PUBLIC_BASE_URL: https://example.invalid
      DATA_DIR: ./data
      SHORTY_ADMIN_TOKEN: ${{ secrets.SHORTY_ADMIN_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_TEXT_MODEL: gemini-2.5-flash
      GEMINI_TTS_MODEL: gemini-2.5-flash-preview-tts
      SHORTY_VOICE_NAME: Sulafat
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REDIRECT_URI: http://localhost
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_DEFAULT_CATEGORY_ID: 22
      YOUTUBE_DEFAULT_LANGUAGE: tr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Generate and upload short
        run: >
          npm run run:headless --
          --privacy "${{ inputs.privacy }}"
          --seedTopic "${{ inputs.seed_topic }}"

      - name: Upload render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorty-run-${{ github.run_number }}
          path: |
            data/headless-last-run.json
            data/jobs/**/job.json
            data/jobs/**/render/final.mp4
            data/jobs/**/captions/captions.ass
            data/jobs/**/audio/voice.wav
          if-no-files-found: ignore
          retention-days: 7

      - name: Append run summary
        if: always()
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'data/headless-last-run.json';
          if (!fs.existsSync(path)) {
            console.log('## Shorty Run');
            console.log('');
            console.log('No summary file was produced.');
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          console.log('## Shorty Run');
          console.log('');
          console.log(`- Status: ${data.status || 'unknown'}`);
          if (data.title) console.log(`- Title: ${data.title}`);
          if (data.topic) console.log(`- Topic: ${data.topic}`);
          if (data.youtubeUrl) console.log(`- YouTube: ${data.youtubeUrl}`);
          if (data.studioUrl) console.log(`- Studio: ${data.studioUrl}`);
          if (data.previewPath) console.log(`- Artifact video: ${data.previewPath}`);
          if (data.error?.message) console.log(`- Error: ${data.error.message}`);
          NODE
